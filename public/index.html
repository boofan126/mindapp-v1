<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>心灵保险 · 人工确认版</title>
    <style>
        /* 全局样式（紧凑版 + 隐私政策链接） */
        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 16px;
        }
        .page { display: block; }
        .hidden { display: none !important; }
        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            color: #111;
        }
        .subhead {
            color: #666;
            font-size: 0.85rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }
        button {
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        button.small {
            padding: 5px 12px;
            font-size: 0.85rem;
        }
        button.primary { background: #007bff; color: white; }
        button.secondary { background: transparent; color: #2c2c2c; border: 1px solid #ccc; }
        .btn-manual { background: #e8f5e8; color: #2c2c2c; border: 1px solid #a5d6a5; }
        .btn-save { background: #fff3cd; color: #2c2c2c; border: 1px solid #ffe69c; }
        .btn-delete { background: #f8d7da; color: #2c2c2c; border: 1px solid #f5c2c7; }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 0.95rem;
            background: white;
        }
        input:read-only { background: #f0f0f0; color: #666; border-color: #ccc; }
        textarea {
            border-radius: 20px;
            min-height: 70px;
        }
        .card {
            background: #fafafa;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #eaeaea;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .task-title-input {
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid transparent;
            background: #f0f0f0;
            border-radius: 40px;
            padding: 6px 12px;
            width: auto;
            min-width: 130px;
            flex: 2;
        }
        .status-badge {
            background: #eee;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-badge.normal { background: #d4edda; color: #155724; }
        .status-badge.warning { background: #fce4b6; color: #8a5f00; }
        .status-badge.final { background: #f8d7da; color: #a11f2c; }

        .human-badge {
            padding: 3px 6px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .human-badge.need {
            background: #f8d7da;
            color: #a11f2c;
        }
        .human-badge.not-need {
            background: #fff3cd;
            color: #8a5f00;
        }

        .row-3col {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            margin-bottom: 8px;
        }
        .col-block {
            padding: 8px 4px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .col-block label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
            text-align: center;
        }
        .cycle-block { background: #e8f5e8; }
        .warning-block { background: #fff3cd; }
        .final-block { background: #f8d7da; }
        .info-box {
            background: #e9ecef;
            border-radius: 12px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 0.7rem;
            color: #495057;
            line-height: 1.3;
        }
        .email-full-width { margin-bottom: 8px; }
        .email-full-width label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 2px;
            display: block;
        }
        .email-full-width input { width: 100%; }
        .button-group-bottom {
            display: flex;
            gap: 4px;
            margin-top: 10px;
        }
        .button-group-bottom button {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 0.85rem;
        }
        .edit-final-container { margin: 4px 0 10px 0; text-align: center; }
        .edit-final-container button {
            width: 100%;
            background: #6c757d;
            color: white;
            padding: 8px;
            font-size: 0.85rem;
        }
        .recent-checkin {
            font-size: 0.65rem;
            color: #999;
            margin-top: 8px;
            text-align: right;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            max-width: 400px;
            width: 90%;
        }
        .grey-bg {
            background: #f2f2f2;
            border-radius: 40px;
            padding: 4px 10px;
            color: #333;
            font-size: 0.8rem;
        }
        .lang-switch { display: flex; gap: 6px; align-items: center; }
        .auto-checkin-note {
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
            text-align: center;
        }
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 65vh;
            text-align: center;
        }
        .welcome-box {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 20px 15px;
            margin: 15px 0;
            width: 100%;
            font-size: 1.3rem;
            color: #333;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
            white-space: pre-line;
        }
        .login-input { width: 100%; margin: 6px 0; }
        .login-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }
        .login-row input { flex: 2; margin-bottom: 0; }
        .login-row button { flex: 1; }
        .task-list-card { margin-bottom: 10px; }
        .task-list-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .task-list-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .task-list-email { color: #555; font-size: 0.8rem; }
        .back-btn { margin-top: 15px; }
        .checkbox-row { display: flex; align-items: center; gap: 6px; margin: 8px 0; }
        .phone-input-group { display: flex; gap: 6px; align-items: center; }
        .country-code { width: 30%; }
        .phone-number { width: 70%; }

        /* 隐私政策链接样式 */
        .privacy-link {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #666;
            text-align: center;
        }
        .privacy-link a {
            color: #007bff;
            text-decoration: none;
        }
        .privacy-link a:hover {
            text-decoration: underline;
        }
        /* 隐私政策模态框内容滚动 */
        .privacy-content {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
            padding-right: 4px;
        }
        .privacy-content p {
            margin-bottom: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- 启动页（登录页） -->
        <div id="splashPage" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h1 data-i18n="appName">心灵保险</h1>
                <div class="lang-switch">
                    <button class="small secondary lang-btn" data-lang="zh">中文</button>
                    <button class="small secondary lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="splash-container">
                <div class="welcome-box" data-i18n="welcomeText">欢迎进入心灵保险！\n有意外，无遗憾！</div>
                <input type="email" id="loginEmail" class="login-input" placeholder="请输入邮箱" value="">
                <div class="login-row">
                    <input type="text" id="loginCode" placeholder="验证码/授权码">
                    <button class="secondary small" id="sendLoginCodeBtn" data-i18n="sendCodeBtn">获取验证码</button>
                </div>
                <button class="enter-btn" id="verifyAndEnterBtn" data-i18n="verifyAndEnter">验证并进入</button>

                <!-- 隐私政策和用户协议链接 -->
                <div class="privacy-link">
                    <a href="#" id="showPrivacyLink" data-i18n="privacyLink">隐私政策</a> |
                    <a href="#" id="showTermsLink" data-i18n="termsLink">用户协议</a>
                </div>
            </div>
        </div>

        <!-- 任务清单总览页 -->
        <div id="taskListPage" class="page hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h1 data-i18n="appName">心灵保险</h1>
                <div class="lang-switch">
                    <button class="small secondary lang-btn" data-lang="zh">中文</button>
                    <button class="small secondary lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="subhead" data-i18n="taskListTitle">任务清单总览</div>
            <div id="taskListContainer"></div>
            <button id="addNewTaskBtn" style="width:100%; background:white; color:#2c2c2c; border:1px dashed #aaa; margin-top:12px;" data-i18n="addTaskBtn">+ 创建新打卡任务</button>
        </div>

        <!-- 任务编辑页（单个任务编辑） -->
        <div id="taskEditPage" class="page hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                <h1 data-i18n="appName">心灵保险</h1>
                <div class="lang-switch">
                    <button class="small secondary lang-btn" data-lang="zh">中文</button>
                    <button class="small secondary lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="subhead" data-i18n="editTaskSubhead">编辑任务</div>
            <div id="editTaskCard" class="card">
                <!-- 任务标题 -->
                <div class="task-header">
                    <input type="text" id="editTaskName" class="task-title-input" placeholder="任务名称">
                    <span id="editTaskStatus" class="status-badge normal">正常打卡</span>
                </div>

                <!-- 三列布局 -->
                <div class="row-3col">
                    <div class="col-block cycle-block">
                        <label data-i18n="cycleLabel">周期</label>
                        <select id="editCycleDays">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                    <div class="col-block warning-block">
                        <label data-i18n="warningDaysLabel">警告</label>
                        <input type="number" id="editWarningDays" min="1" max="30" value="2">
                    </div>
                    <div class="col-block final-block">
                        <label data-i18n="finalDaysLabel">终止</label>
                        <input type="number" id="editFinalDays" min="1" max="30" value="3">
                    </div>
                </div>

                <!-- 说明框 -->
                <div class="info-box" data-i18n="infoText">周期：自己设定的打卡周期；警告：未按时打卡后天数，系统会触发警告提示；终止：警告后天数，系统会触发终止任务通知；</div>

                <!-- 警告邮箱：只读 -->
                <div class="email-full-width">
                    <label data-i18n="warningEmailLabel">警告邮件发至（登录邮箱）</label>
                    <input type="email" id="editWarningEmail" readonly>
                </div>

                <!-- 终止邮箱 -->
                <div class="email-full-width">
                    <label data-i18n="finalEmailLabel">终止通知发至</label>
                    <input type="email" id="editFinalEmail" placeholder="例如：supervisor@example.com">
                </div>

                <!-- 编辑终止通知按钮 + 人工确认复选框 -->
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <button id="editFinalBtn" class="small" style="background:#6c757d; color:white; flex:1;" data-i18n="editFinalBtn">编辑终止通知</button>
                    <label style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                        <input type="checkbox" id="needHumanConfirmCheckbox">
                        <span data-i18n="needHumanConfirmLabel">需要人工确认</span>
                    </label>
                </div>

                <!-- 警告内容输入框 -->
                <div class="email-full-width">
                    <label data-i18n="warningContentLabel">警告内容（给自己）</label>
                    <input type="text" id="editWarningMessage" placeholder="例如：请及时打卡">
                </div>

                <!-- 底部按钮组：手动打卡、保存任务、删除任务 -->
                <div class="button-group-bottom">
                    <button id="editManualCheckinBtn" class="small btn-manual" data-i18n="manualCheckinBtn">手动打卡</button>
                    <button id="editSaveTaskBtn" class="small btn-save" data-i18n="saveTaskBtn">保存任务</button>
                    <button id="editDeleteTaskBtn" class="small btn-delete" data-i18n="deleteBtn">删除任务</button>
                </div>
                <!-- 返回按钮 -->
                <button id="backToTaskListBtn" class="small secondary" style="width:100%; margin-top:8px;" data-i18n="backToList">返回任务清单</button>

                <!-- 最近打卡时间 -->
                <div id="editLastCheckin" class="recent-checkin">最近打卡：从未</div>
            </div>
        </div>

        <!-- 编辑终止通知模态框 -->
        <div id="editFinalModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 style="margin-bottom:12px;" data-i18n="editFinalTitle">✉️ 编辑终止通知邮件</h3>
                <label data-i18n="finalMsgLabel">终止任务通知邮件内容（给监督人）</label>
                <textarea id="editFinalMsg" placeholder="例如：用户已连续多日未打卡，任务终止..." rows="3"></textarea>
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:12px;">
                    <button class="secondary" id="editFinalCancelBtn" data-i18n="cancelBtn">取消</button>
                    <button id="editFinalSaveBtn" data-i18n="saveBtn">保存</button>
                </div>
            </div>
        </div>

        <!-- 人工确认电话输入模态框 -->
        <div id="phoneModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 style="margin-bottom:12px;" data-i18n="phoneModalTitle">请输入联系电话</h3>
                <p style="margin-bottom:10px; color:#555;" data-i18n="phoneModalHint">客服将通过此电话与您联系确认</p>
                <div class="phone-input-group">
                    <select id="countryCode" class="country-code">
                        <option value="+86">+86 (中国)</option>
                        <option value="+1">+1 (美国)</option>
                        <option value="+852">+852 (香港)</option>
                        <option value="+853">+853 (澳门)</option>
                        <option value="+886">+886 (台湾)</option>
                        <option value="+81">+81 (日本)</option>
                        <option value="+82">+82 (韩国)</option>
                        <option value="+44">+44 (英国)</option>
                    </select>
                    <input type="tel" id="phoneNumber" class="phone-number" placeholder="手机号码" value="">
                </div>
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:12px;">
                    <button class="secondary" id="phoneCancelBtn" data-i18n="cancelBtn">取消</button>
                    <button id="phoneSaveBtn" data-i18n="saveBtn">保存</button>
                </div>
            </div>
        </div>

        <!-- 等待授权提示模态框 -->
        <div id="waitAuthModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 style="margin-bottom:12px;">⏳ 等待授权</h3>
                <p style="margin-bottom:10px; color:#555;" id="waitAuthMessage">您的邮箱正在等待授权，请等待授权码！</p>
                <div style="text-align:center;">
                    <button id="closeWaitAuthBtn" class="primary">确定</button>
                </div>
            </div>
        </div>

        <!-- 隐私政策模态框 -->
        <div id="privacyModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 data-i18n="privacyTitle" style="margin-bottom:12px;">🔒 隐私政策</h3>
                <div class="privacy-content" id="privacyContent">
                    <!-- 内容由JavaScript动态填充 -->
                </div>
                <div style="text-align:right;">
                    <button id="closePrivacyBtn" data-i18n="closeBtn" class="primary small">关闭</button>
                </div>
            </div>
        </div>

        <!-- 用户协议模态框 -->
        <div id="termsModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 data-i18n="termsTitle" style="margin-bottom:12px;">📜 用户协议</h3>
                <div class="privacy-content" id="termsContent">
                    <!-- 内容由JavaScript动态填充 -->
                </div>
                <div style="text-align:right;">
                    <button id="closeTermsBtn" data-i18n="closeBtn" class="primary small">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = 'https://mindapp-v1.onrender.com/api'; // 请根据实际后端地址修改

            // ---------- 语言包（包含所有中英文文本）----------
            const i18n = {
                zh: {
                    appName: '心灵保险',
                    welcomeText: '欢迎进入心灵保险！ \n 有意外，无遗憾！',
                    sendCodeBtn: '获取验证码',
                    verifyAndEnter: '验证并进入',
                    taskListTitle: '任务清单总览',
                    addTaskBtn: '+ 创建新打卡任务',
                    editTaskSubhead: '编辑任务',
                    cycleLabel: '周期',
                    warningDaysLabel: '警告',
                    finalDaysLabel: '终止',
                    warningEmailLabel: '警告邮件发至（登录邮箱）',
                    finalEmailLabel: '终止通知发至',
                    warningContentLabel: '警告内容（给自己）',
                    warningContentPlaceholder: '例如：请及时打卡',
                    manualCheckinBtn: '手动打卡',
                    saveTaskBtn: '保存任务',
                    editFinalBtn: '编辑终止通知',
                    deleteBtn: '删除任务',
                    backToList: '返回任务清单',
                    cancelBtn: '取消',
                    saveBtn: '保存',
                    editFinalTitle: '✉️ 编辑终止通知邮件',
                    finalMsgLabel: '终止任务通知邮件内容（给监督人）',
                    needHumanConfirmLabel: '需要人工确认',
                    phoneModalTitle: '请输入联系电话',
                    phoneModalHint: '客服将通过此电话与您联系确认',
                    statusNormal: '正常打卡',
                    statusWarning: '⚠️ 警告中',
                    statusFinal: '🔔 正式通知结束',
                    infoText: '周期：自己设定的打卡周期；警告：未按时打卡后天数，系统会触发警告提示；终止：警告后天数，系统会触发终止任务通知；',
                    loginEmailRequired: '请输入邮箱',
                    codeRequired: '请输入验证码',
                    codeSent: '验证码已发送',

                    verifySuccess: '验证成功，正在进入...',

                    apiError: '连接后端失败，请检查网络或稍后重试',
                    confirmDelete: '确定删除此任务？',

                    noTasks: '暂无任务，点击下方创建',

                    lastCheckinLabel: '最近打卡：',

                    // 新增隐私政策相关
                    privacyLink: '隐私政策',
                    termsLink: '用户协议',
                    privacyTitle: '🔒 隐私政策',
                    termsTitle: '📜 用户协议',
                    closeBtn: '关闭',
                    privacyText: `
                        <p>我们（心灵保险）非常重视您的隐私。本政策说明我们如何收集、使用和保护您的个人信息。</p>
                        <p><strong>1. 信息收集</strong><br>我们收集您主动提供的邮箱地址、联系电话、任务内容及打卡时间。这些信息用于登录验证、发送提醒通知及客服人工确认。</p>

            let currentLang = localStorage.getItem('mind_insurance_lang') || 'zh';

            // ---------- 通用函数：更新界面语言 ----------
            function updateUILanguage() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (i18n[currentLang] && i18n[currentLang][key]) {
                        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                            el.placeholder = i18n[currentLang][key];
                        } else if (el.tagName === 'LABEL' && el.htmlFor) {
                            el.innerText = i18n[currentLang][key];
                        } else {
                            el.innerText = i18n[currentLang][key];
                        }
                    }
                });
                // 更新隐私内容和协议内容（因为它们是动态HTML）
                document.getElementById('privacyContent').innerHTML = i18n[currentLang].privacyText;
                document.getElementById('termsContent').innerHTML = i18n[currentLang].termsText;
            }

            function bindLangButtons() {
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const lang = e.target.getAttribute('data-lang');
                        if (lang) {
                            currentLang = lang;
                            localStorage.setItem('mind_insurance_lang', lang);
                            updateUILanguage();
                            if (!document.getElementById('splashPage').classList.contains('hidden')) {
                                // 登录页无需刷新列表
                            } else if (!document.getElementById('taskListPage').classList.contains('hidden')) {
                                renderTaskList();
                            } else if (!document.getElementById('taskEditPage').classList.contains('hidden')) {
                                updateEditPageStatus();
                            }
                        }
                    });
                });
            }

            // ---------- 登录验证码相关（含首次授权逻辑）----------
            document.getElementById('sendLoginCodeBtn').addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value.trim();
                if (!email) {
                    alert(i18n[currentLang].loginEmailRequired);
                    return;
                }
                try {
                    const res = await fetch(`${API_BASE}/send-login-code`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert(i18n[currentLang].codeSent);
                    } else {
                        if (res.status === 403 && data.error === 'NEED_AUTHORIZATION') {
                            document.getElementById('waitAuthMessage').innerText = data.message || '您的邮箱正在等待授权，请等待授权码！';
                            document.getElementById('waitAuthModal').classList.remove('hidden');
                        } else {
                            alert(data.error || i18n[currentLang].codeSendFailed);
                        }
                    }
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            // 关闭等待授权模态框
            document.getElementById('closeWaitAuthBtn').addEventListener('click', () => {
                document.getElementById('waitAuthModal').classList.add('hidden');
            });
            document.getElementById('waitAuthModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('waitAuthModal')) {
                    document.getElementById('waitAuthModal').classList.add('hidden');
                }
            });

            // ---------- 验证登录码（已授权用户验证码 / 首次授权码）----------
            document.getElementById('verifyAndEnterBtn').addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value.trim();
                const code = document.getElementById('loginCode').value.trim();
                if (!email || !code) {
                    alert(i18n[currentLang].loginEmailRequired || '请填写邮箱和验证码');
                    return;
                }
                try {
                    const res = await fetch(`${API_BASE}/verify-login-code`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, code })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('loginEmail', email);
                        alert(i18n[currentLang].verifySuccess || '验证成功');
                        await tryAutoCheckin(email);
                        document.getElementById('splashPage').classList.add('hidden');
                        document.getElementById('taskListPage').classList.remove('hidden');
                        renderTaskList();
                    } else {
                        alert(data.error || i18n[currentLang].verifyFailed || '验证失败');
                    }
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            // ---------- 后端 API 封装 ----------
            async function fetchTasks() {
                const email = localStorage.getItem('loginEmail');
                if (!email) throw new Error('未登录');
                const res = await fetch(`${API_BASE}/tasks?email=${encodeURIComponent(email)}`);
                if (!res.ok) throw new Error('获取任务失败');
                return await res.json();
            }

            async function createTask(task) {
                const email = localStorage.getItem('loginEmail');
                if (!email) throw new Error('未登录');
                const taskWithUser = { ...task, user_email: email };
                const res = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(taskWithUser)
                });
                if (!res.ok) throw new Error('创建任务失败');
                return await res.json();
            }

            async function updateTask(taskId, updates) {
                const email = localStorage.getItem('loginEmail');
                if (!email) throw new Error('未登录');
                const res = await fetch(`${API_BASE}/tasks/${taskId}?email=${encodeURIComponent(email)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                if (!res.ok) throw new Error('更新任务失败');
            }

            async function deleteTask(taskId) {
                const email = localStorage.getItem('loginEmail');
                if (!email) throw new Error('未登录');
                const res = await fetch(`${API_BASE}/tasks/${taskId}?email=${encodeURIComponent(email)}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('删除任务失败');
            }

            async function checkinTask(taskId) {
                const email = localStorage.getItem('loginEmail');
                if (!email) throw new Error('未登录');
                const res = await fetch(`${API_BASE}/tasks/${taskId}/checkin?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                if (!res.ok) throw new Error('打卡失败');
            }

            // ---------- 自动打卡函数 ----------
            async function tryAutoCheckin(email) {
                const today = new Date().toISOString().split('T')[0];
                const lastAuto = localStorage.getItem('lastAutoCheckinDate');
                if (lastAuto === today) {
                    console.log('今日已自动打卡，跳过');
                    return;
                }
                try {
                    const res = await fetch(`${API_BASE}/auto-checkin?email=${encodeURIComponent(email)}`, {
                        method: 'POST'
                    });
                    if (res.ok) {
                        localStorage.setItem('lastAutoCheckinDate', today);
                        console.log('自动打卡成功，重新获取任务列表');
                        tasks = await fetchTasks();
                        if (!document.getElementById('taskListPage').classList.contains('hidden')) {
                            renderTaskList();
                        }
                    } else {
                        console.warn('自动打卡失败，稍后重试');
                    }
                } catch (err) {
                    console.error('自动打卡请求失败', err);
                }
            }

            // ---------- 状态计算 ----------
            let tasks = [];
            let currentEditTaskId = null;
            let tempNeedHumanConfirm = false;

            function getDaysSince(timestamp) {
                const now = Date.now();
                const diffMs = now - timestamp;
                return Math.floor(diffMs / (24 * 60 * 60 * 1000));
            }

            function computeTaskStatus(task) {
                const daysSince = getDaysSince(task.lastCheckin);
                const cycleDays = task.cycleDays;
                if (daysSince <= cycleDays) return 'normal';
                const overdueDays = daysSince - cycleDays;
                if (overdueDays < task.warningDays) return 'normal';
                if (overdueDays < task.warningDays + task.finalDays) return 'warning';
                return 'final';
            }

            // ---------- 渲染任务清单 ----------
            async function renderTaskList() {
                const container = document.getElementById('taskListContainer');
                if (!container) return;
                container.innerHTML = '<div class="card" style="color:#888;">加载中...</div>';
                try {
                    tasks = await fetchTasks();
                } catch (err) {
                    console.error(err);
                    container.innerHTML = `<div class="card" style="color:#b33;">${i18n[currentLang].apiError}</div>`;
                    return;
                }
                if (tasks.length === 0) {
                    container.innerHTML = `<div class="card" style="color:#888;">${i18n[currentLang].noTasks}</div>`;
                    return;
                }
                let html = '';
                tasks.forEach(task => {
                    const status = computeTaskStatus(task);
                    let statusClass = 'normal';
                    let statusText = i18n[currentLang].statusNormal;
                    if (status === 'warning') {
                        statusClass = 'warning';
                        statusText = i18n[currentLang].statusWarning;
                    } else if (status === 'final') {
                        statusClass = 'final';
                        statusText = i18n[currentLang].statusFinal;
                    }

                    const needHuman = task.needHumanConfirm === 1 || task.needHumanConfirm === true;
                    const humanBadge = needHuman
                        ? '<span class="human-badge need">人工确认</span>'
                        : '<span class="human-badge not-need">不需人工</span>';

                    html += `
                        <div class="card task-list-card" data-task-id="${task.id}">
                            <div class="task-list-name">${escapeHtml(task.name)}</div>
                            <div class="task-list-info">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="task-list-email">终止通知人：${escapeHtml(task.finalEmail || '未设置')}</span>
                                    ${humanBadge}
                                </div>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                document.querySelectorAll('.task-list-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const taskId = card.dataset.taskId;
                        const task = tasks.find(t => t.id === taskId);
                        if (task) {
                            currentEditTaskId = task.id;
                            populateEditPage(task);
                            document.getElementById('taskListPage').classList.add('hidden');
                            document.getElementById('taskEditPage').classList.remove('hidden');
                        }
                    });
                });
            }

            // 填充编辑页
            function populateEditPage(task) {
                document.getElementById('editTaskName').value = task.name || '';
                document.getElementById('editCycleDays').value = task.cycleDays || 1;
                document.getElementById('editWarningDays').value = task.warningDays || 1;
                document.getElementById('editFinalDays').value = task.finalDays || 1;
                document.getElementById('editWarningEmail').value = task.warningEmail || localStorage.getItem('loginEmail') || '';
                document.getElementById('editFinalEmail').value = task.finalEmail || '';
                document.getElementById('editWarningMessage').value = task.warningMessage || '';
                document.getElementById('editLastCheckin').innerText = i18n[currentLang].lastCheckinLabel + (task.lastCheckin ? new Date(task.lastCheckin).toLocaleString() : i18n[currentLang].never);
                const needHumanConfirm = task.needHumanConfirm === 1 || task.needHumanConfirm === true;
                document.getElementById('needHumanConfirmCheckbox').checked = needHumanConfirm;
                updateEditPageStatus();
            }

            function updateEditPageStatus() {
                if (!currentEditTaskId) return;
                const task = tasks.find(t => t.id === currentEditTaskId);
                if (!task) return;
                const status = computeTaskStatus(task);
                const badge = document.getElementById('editTaskStatus');
                badge.className = 'status-badge ' + status;
                if (status === 'normal') badge.innerText = i18n[currentLang].statusNormal;
                else if (status === 'warning') badge.innerText = i18n[currentLang].statusWarning;
                else badge.innerText = i18n[currentLang].statusFinal;
            }

            // 保存任务（新建或更新）
            async function saveEditTask() {
                const loginEmail = localStorage.getItem('loginEmail');
                if (!loginEmail) return;
                const needHumanConfirm = document.getElementById('needHumanConfirmCheckbox').checked;
                const existingTask = currentEditTaskId ? tasks.find(t => t.id === currentEditTaskId) : null;
                const taskData = {
                    name: document.getElementById('editTaskName').value.trim() || '未命名任务',
                    cycleDays: parseInt(document.getElementById('editCycleDays').value, 10) || 1,
                    warningDays: parseInt(document.getElementById('editWarningDays').value, 10) || 1,
                    finalDays: parseInt(document.getElementById('editFinalDays').value, 10) || 1,
                    warningEmail: loginEmail,
                    finalEmail: document.getElementById('editFinalEmail').value.trim(),
                    warningMessage: document.getElementById('editWarningMessage').value.trim(),
                    finalMessage: existingTask ? existingTask.finalMessage || '' : '',
                    needHumanConfirm: needHumanConfirm ? 1 : 0,
                    contactPhone: needHumanConfirm ? (localStorage.getItem('tempContactPhone') || '') : ''
                };
                if (currentEditTaskId) {
                    await updateTask(currentEditTaskId, taskData);
                    const task = tasks.find(t => t.id === currentEditTaskId);
                    if (task) Object.assign(task, taskData);
                } else {
                    taskData.lastCheckin = Date.now();
                    const newTask = await createTask(taskData);
                    tasks.push(newTask);
                    currentEditTaskId = newTask.id;
                }
                const updatedTask = tasks.find(t => t.id === currentEditTaskId);
                if (updatedTask) populateEditPage(updatedTask);
            }

            // ---------- 事件绑定 ----------
            // 人工确认复选框变化
            document.getElementById('needHumanConfirmCheckbox').addEventListener('change', (e) => {
                if (e.target.checked) {
                    tempNeedHumanConfirm = true;
                    if (currentEditTaskId) {
                        const task = tasks.find(t => t.id === currentEditTaskId);
                        if (task && task.contactPhone) {
                            const parts = task.contactPhone.split(' ');
                            if (parts.length === 2) {
                                document.getElementById('countryCode').value = parts[0];
                                document.getElementById('phoneNumber').value = parts[1];
                            } else {
                                document.getElementById('phoneNumber').value = task.contactPhone;
                            }
                        } else {
                            document.getElementById('countryCode').value = '+86';
                            document.getElementById('phoneNumber').value = '';
                        }
                    } else {
                        document.getElementById('countryCode').value = '+86';
                        document.getElementById('phoneNumber').value = '';
                    }
                    document.getElementById('phoneModal').classList.remove('hidden');
                } else {
                    localStorage.removeItem('tempContactPhone');
                }
            });

            document.getElementById('phoneSaveBtn').addEventListener('click', () => {
                const countryCode = document.getElementById('countryCode').value;
                const phone = document.getElementById('phoneNumber').value.trim();
                if (!phone) {
                    alert('请输入手机号码');
                    return;
                }
                const fullPhone = countryCode + ' ' + phone;
                localStorage.setItem('tempContactPhone', fullPhone);
                document.getElementById('phoneModal').classList.add('hidden');
            });

            document.getElementById('phoneCancelBtn').addEventListener('click', () => {
                document.getElementById('needHumanConfirmCheckbox').checked = false;
                localStorage.removeItem('tempContactPhone');
                document.getElementById('phoneModal').classList.add('hidden');
            });

            document.getElementById('editFinalBtn').addEventListener('click', async () => {
                if (!currentEditTaskId) return;
                const task = tasks.find(t => t.id === currentEditTaskId);
                if (!task) return;
                await saveEditTask();
                document.getElementById('editFinalMsg').value = task.finalMessage || '';
                document.getElementById('editFinalModal').classList.remove('hidden');
            });

            document.getElementById('editFinalSaveBtn').addEventListener('click', async () => {
                if (!currentEditTaskId) return;
                const newFinalMsg = document.getElementById('editFinalMsg').value;
                try {
                    await updateTask(currentEditTaskId, { finalMessage: newFinalMsg });
                    const task = tasks.find(t => t.id === currentEditTaskId);
                    if (task) task.finalMessage = newFinalMsg;
                    document.getElementById('editFinalModal').classList.add('hidden');
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            document.getElementById('editFinalCancelBtn').addEventListener('click', () => {
                document.getElementById('editFinalModal').classList.add('hidden');
            });

            document.getElementById('editFinalModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('editFinalModal')) {
                    document.getElementById('editFinalModal').classList.add('hidden');
                }
            });

            document.getElementById('editSaveTaskBtn').addEventListener('click', async () => {
                if (!confirm(i18n[currentLang].confirmSave)) return;
                try {
                    await saveEditTask();
                    alert('保存成功');
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            document.getElementById('editManualCheckinBtn').addEventListener('click', async () => {
                if (!currentEditTaskId) return;
                try {
                    await checkinTask(currentEditTaskId);
                    const task = tasks.find(t => t.id === currentEditTaskId);
                    if (task) {
                        task.lastCheckin = Date.now();
                        task.warningSent = 0;
                        task.finalSent = 0;
                        task.warningTriggeredAt = null;
                        task.customerNotified = 0;
                        populateEditPage(task);
                    }
                    alert(currentLang === 'zh' ? '✅ 手动打卡成功！' : '✅ Manual check-in successful!');
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            document.getElementById('editDeleteTaskBtn').addEventListener('click', async () => {
                if (!currentEditTaskId) return;
                if (!confirm(i18n[currentLang].confirmDelete)) return;
                try {
                    await deleteTask(currentEditTaskId);
                    tasks = tasks.filter(t => t.id !== currentEditTaskId);
                    document.getElementById('taskEditPage').classList.add('hidden');
                    document.getElementById('taskListPage').classList.remove('hidden');
                    renderTaskList();
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            document.getElementById('backToTaskListBtn').addEventListener('click', () => {
                document.getElementById('taskEditPage').classList.add('hidden');
                document.getElementById('taskListPage').classList.remove('hidden');
                renderTaskList();
            });

            document.getElementById('addNewTaskBtn').addEventListener('click', () => {
                currentEditTaskId = null;
                document.getElementById('editTaskName').value = '';
                document.getElementById('editCycleDays').value = 1;
                document.getElementById('editWarningDays').value = 2;
                document.getElementById('editFinalDays').value = 3;
                document.getElementById('editWarningEmail').value = localStorage.getItem('loginEmail') || '';
                document.getElementById('editFinalEmail').value = '';
                document.getElementById('editWarningMessage').value = '';
                document.getElementById('editLastCheckin').innerText = i18n[currentLang].lastCheckinLabel + i18n[currentLang].never;
                document.getElementById('editTaskStatus').className = 'status-badge normal';
                document.getElementById('editTaskStatus').innerText = i18n[currentLang].statusNormal;
                document.getElementById('needHumanConfirmCheckbox').checked = false;
                localStorage.removeItem('tempContactPhone');
                document.getElementById('taskListPage').classList.add('hidden');
                document.getElementById('taskEditPage').classList.remove('hidden');
            });

            // 隐私政策和用户协议模态框控制
            document.getElementById('showPrivacyLink').addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('privacyModal').classList.remove('hidden');
            });
            document.getElementById('closePrivacyBtn').addEventListener('click', () => {
                document.getElementById('privacyModal').classList.add('hidden');
            });
            document.getElementById('privacyModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('privacyModal')) {
                    document.getElementById('privacyModal').classList.add('hidden');
                }
            });

            document.getElementById('showTermsLink').addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('termsModal').classList.remove('hidden');
            });
            document.getElementById('closeTermsBtn').addEventListener('click', () => {
                document.getElementById('termsModal').classList.add('hidden');
            });
            document.getElementById('termsModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('termsModal')) {
                    document.getElementById('termsModal').classList.add('hidden');
                }
            });

            // ---------- 初始化 ----------
            window.addEventListener('DOMContentLoaded', () => {
                updateUILanguage();
                bindLangButtons();
                // 预填充隐私内容
                document.getElementById('privacyContent').innerHTML = i18n[currentLang].privacyText;
                document.getElementById('termsContent').innerHTML = i18n[currentLang].termsText;
            });

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }
        })();
    </script>
</body>
</html>
