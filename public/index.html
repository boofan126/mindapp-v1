<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>心灵保险 · 优化版</title>
    <style>
        /* 紧凑样式，与腾讯云版一致 */
        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 16px;
        }
        .page { display: block; }
        .hidden { display: none !important; }
        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            color: #111;
        }
        .subhead {
            color: #666;
            font-size: 0.85rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }
        button {
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        button.small {
            padding: 5px 12px;
            font-size: 0.85rem;
        }
        button.primary { background: #007bff; color: white; }
        button.secondary { background: transparent; color: #2c2c2c; border: 1px solid #ccc; }
        .btn-manual { background: #e8f5e8; color: #2c2c2c; border: 1px solid #a5d6a5; }
        .btn-save { background: #fff3cd; color: #2c2c2c; border: 1px solid #ffe69c; }
        .btn-delete { background: #f8d7da; color: #2c2c2c; border: 1px solid #f5c2c7; }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 0.95rem;
            background: white;
        }
        input:read-only { background: #f0f0f0; color: #666; border-color: #ccc; }
        textarea {
            border-radius: 20px;
            min-height: 70px;
        }
        .card {
            background: #fafafa;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #eaeaea;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .task-title-input {
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid transparent;
            background: #f0f0f0;
            border-radius: 40px;
            padding: 6px 12px;
            width: auto;
            min-width: 130px;
            flex: 2;
        }
        .status-badge {
            background: #eee;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-badge.normal { background: #d4edda; color: #155724; }
        .status-badge.warning { background: #fce4b6; color: #8a5f00; }
        .status-badge.final { background: #f8d7da; color: #a11f2c; }

        .human-badge {
            padding: 3px 6px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .human-badge.need {
            background: #f8d7da;
            color: #a11f2c;
        }
        .human-badge.not-need {
            background: #fff3cd;
            color: #8a5f00;
        }

        .row-3col {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            margin-bottom: 8px;
        }
        .col-block {
            padding: 8px 4px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .col-block label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
            text-align: center;
        }
        .cycle-block { background: #e8f5e8; }
        .warning-block { background: #fff3cd; }
        .final-block { background: #f8d7da; }
        .info-box {
            background: #e9ecef;
            border-radius: 12px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 0.7rem;
            color: #495057;
            line-height: 1.3;
        }
        .email-full-width { margin-bottom: 8px; }
        .email-full-width label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 2px;
            display: block;
        }
        .email-full-width input { width: 100%; }
        .button-group-bottom {
            display: flex;
            gap: 4px;
            margin-top: 10px;
        }
        .button-group-bottom button {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 0.85rem;
        }
        .edit-final-container { margin: 4px 0 10px 0; text-align: center; }
        .edit-final-container button {
            width: 100%;
            background: #6c757d;
            color: white;
            padding: 8px;
            font-size: 0.85rem;
        }
        .recent-checkin {
            font-size: 0.65rem;
            color: #999;
            margin-top: 8px;
            text-align: right;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            max-width: 400px;
            width: 90%;
        }
        .grey-bg {
            background: #f2f2f2;
            border-radius: 40px;
            padding: 4px 10px;
            color: #333;
            font-size: 0.8rem;
        }
        .lang-switch { display: flex; gap: 6px; align-items: center; }
        .auto-checkin-note {
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
            text-align: center;
        }
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 65vh;
            text-align: center;
        }
        .welcome-box {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 20px 15px;
            margin: 15px 0;
            width: 100%;
            font-size: 1.3rem;
            color: #333;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
            white-space: pre-line;
        }
        .login-input { width: 100%; margin: 6px 0; }
        .login-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }
        .login-row input { flex: 2; margin-bottom: 0; }
        .login-row button { flex: 1; }
        .task-list-card { margin-bottom: 10px; }
        .task-list-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .task-list-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .task-list-email { color: #555; font-size: 0.8rem; }
        .back-btn { margin-top: 15px; }
        .checkbox-row { display: flex; align-items: center; gap: 6px; margin: 8px 0; }
        .phone-input-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .country-code {
            width: 35%;
            font-size: 0.8rem;  /* 缩小字体避免遮挡 */
        }
        .phone-number {
            width: 65%;
            font-size: 0.9rem;
        }

        .privacy-link {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #666;
            text-align: center;
        }
        .privacy-link a {
            color: #007bff;
            text-decoration: none;
        }
        .privacy-link a:hover {
            text-decoration: underline;
        }
        .privacy-content {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
            padding-right: 4px;
        }
        .privacy-content p {
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .task-list-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .task-list-actions button:first-child {
            flex: 1;
            width: 33.33%;
        }
        .task-list-actions button:last-child {
            flex: 2;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- 启动页（登录页） -->
        <div id="splashPage" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h1 data-i18n="appName">心灵保险</h1>
                <div class="lang-switch">
                    <button class="small secondary lang-btn" data-lang="zh">中文</button>
                    <button class="small secondary lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="splash-container">
                <div class="welcome-box" data-i18n="welcomeText">欢迎进入心灵保险！
有意外，无遗憾！</div>
                <input type="email" id="loginEmail" class="login-input" placeholder="请输入邮箱" value="">
                <div class="login-row">
                    <input type="text" id="loginCode" placeholder="验证码/授权码">
                    <button class="secondary small" id="sendLoginCodeBtn" data-i18n="sendCodeBtn">获取验证码</button>
                </div>
                <button class="primary enter-btn" id="verifyAndEnterBtn" data-i18n="verifyAndEnter">验证并进入</button>
                <div class="privacy-link">
                    <a href="#" id="showPrivacyLink" data-i18n="privacyLink">隐私政策</a> |
                    <a href="#" id="showTermsLink" data-i18n="termsLink">用户协议</a>
                </div>
            </div>
        </div>

        <!-- 任务清单总览页 -->
        <div id="taskListPage" class="page hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h1 data-i18n="appName">心灵保险</h1>
                <div class="lang-switch">
                    <button class="small secondary lang-btn" data-lang="zh">中文</button>
                    <button class="small secondary lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="subhead" data-i18n="taskListTitle">任务清单总览</div>
            <div id="taskListContainer"></div>
            <!-- 新增：一键打卡按钮行 -->
            <div class="task-list-actions">
                <button id="autoCheckinAllBtn" class="small btn-manual" data-i18n="autoCheckinAll">一键打卡</button>
                <button id="addNewTaskBtn" class="small" style="background:white; color:#2c2c2c; border:1px dashed #aaa;" data-i18n="addTaskBtn">+ 创建新打卡任务</button>
            </div>
        </div>

        <!-- 任务编辑页（单个任务编辑） -->
        <div id="taskEditPage" class="page hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                <h1 data-i18n="appName">心灵保险</h1>
                <div class="lang-switch">
                    <button class="small secondary lang-btn" data-lang="zh">中文</button>
                    <button class="small secondary lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="subhead" data-i18n="editTaskSubhead">编辑任务</div>
            <div id="editTaskCard" class="card">
                <div class="task-header">
                    <input type="text" id="editTaskName" class="task-title-input" placeholder="任务名称">
                    <span id="editTaskStatus" class="status-badge normal">正常打卡</span>
                </div>
                <div class="row-3col">
                    <div class="col-block cycle-block">
                        <label data-i18n="cycleLabel">周期</label>
                        <select id="editCycleDays">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                    <div class="col-block warning-block">
                        <label data-i18n="warningDaysLabel">警告</label>
                        <input type="number" id="editWarningDays" min="1" max="30" value="2">
                    </div>
                    <div class="col-block final-block">
                        <label data-i18n="finalDaysLabel">终止</label>
                        <input type="number" id="editFinalDays" min="1" max="30" value="3">
                    </div>
                </div>
                <div class="info-box" data-i18n="infoText">周期：自己设定的打卡周期；警告：未按时打卡后天数，系统会触发警告提示；终止：警告后天数，系统会触发终止任务通知；</div>
                <div class="email-full-width">
                    <label data-i18n="warningEmailLabel">警告邮件发至（登录邮箱）</label>
                    <input type="email" id="editWarningEmail" readonly>
                </div>
                <div class="email-full-width">
                    <label data-i18n="finalEmailLabel">终止通知发至</label>
                    <input type="email" id="editFinalEmail" placeholder="例如：supervisor@example.com">
                </div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <button id="editFinalBtn" class="small" style="background:#6c757d; color:white; flex:1;" data-i18n="editFinalBtn">编辑终止通知</button>
                    <label style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                        <input type="checkbox" id="needHumanConfirmCheckbox">
                        <span data-i18n="needHumanConfirmLabel">需要人工确认</span>
                    </label>
                </div>
                <div class="email-full-width">
                    <label data-i18n="warningContentLabel">警告内容（给自己）</label>
                    <input type="text" id="editWarningMessage" placeholder="例如：请及时打卡">
                </div>
                <div class="button-group-bottom">
                    <button id="editManualCheckinBtn" class="small btn-manual" data-i18n="manualCheckinBtn">手动打卡</button>
                    <button id="editSaveTaskBtn" class="small btn-save" data-i18n="saveTaskBtn">保存任务</button>
                    <button id="editDeleteTaskBtn" class="small btn-delete" data-i18n="deleteBtn">删除任务</button>
                </div>
                <button id="backToTaskListBtn" class="small secondary" style="width:100%; margin-top:8px;" data-i18n="backToList">返回任务清单</button>
                <div id="editLastCheckin" class="recent-checkin">最近打卡：从未</div>
            </div>
        </div>

        <!-- 编辑终止通知模态框 -->
        <div id="editFinalModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 style="margin-bottom:12px;" data-i18n="editFinalTitle">✉️ 编辑终止通知邮件</h3>
                <label data-i18n="finalMsgLabel">终止任务通知邮件内容（给监督人）</label>
                <textarea id="editFinalMsg" placeholder="例如：用户已连续多日未打卡，任务终止..." rows="3"></textarea>
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:12px;">
                    <button class="secondary" id="editFinalCancelBtn" data-i18n="cancelBtn">取消</button>
                    <button class="primary" id="editFinalSaveBtn" data-i18n="saveBtn">保存</button>
                </div>
            </div>
        </div>

        <!-- 人工确认电话输入模态框 -->
        <div id="phoneModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 style="margin-bottom:12px;" data-i18n="phoneModalTitle">请输入联系电话</h3>
                <p style="margin-bottom:10px; color:#555;" data-i18n="phoneModalHint">客服将通过此电话与您联系确认</p>
                <div class="phone-input-group">
                    <select id="countryCode" class="country-code">
                        <option value="+86">+86 (中国)</option>
                        <option value="+1">+1 (美国)</option>
                        <option value="+852">+852 (香港)</option>
                        <option value="+853">+853 (澳门)</option>
                        <option value="+886">+886 (台湾)</option>
                        <option value="+81">+81 (日本)</option>
                        <option value="+82">+82 (韩国)</option>
                        <option value="+44">+44 (英国)</option>
                    </select>
                    <input type="tel" id="phoneNumber" class="phone-number" placeholder="手机号码" value="">
                </div>
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:12px;">
                    <button class="secondary" id="phoneCancelBtn" data-i18n="cancelBtn">取消</button>
                    <button class="primary" id="phoneSaveBtn" data-i18n="saveBtn">保存</button>
                </div>
            </div>
        </div>

        <!-- 等待授权提示模态框 -->
        <div id="waitAuthModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 style="margin-bottom:12px;">⏳ 等待授权</h3>
                <p style="margin-bottom:10px; color:#555;" id="waitAuthMessage">您的邮箱正在等待授权，请等待授权码！</p>
                <div style="text-align:center;">
                    <button id="closeWaitAuthBtn" class="primary">确定</button>
                </div>
            </div>
        </div>

        <!-- 隐私政策模态框 -->
        <div id="privacyModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 data-i18n="privacyTitle" style="margin-bottom:12px;">🔒 隐私政策</h3>
                <div class="privacy-content" id="privacyContent"></div>
                <div style="text-align:right;">
                    <button id="closePrivacyBtn" data-i18n="closeBtn" class="primary small">关闭</button>
                </div>
            </div>
        </div>

        <!-- 用户协议模态框 -->
        <div id="termsModal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 data-i18n="termsTitle" style="margin-bottom:12px;">📜 用户协议</h3>
                <div class="privacy-content" id="termsContent"></div>
                <div style="text-align:right;">
                    <button id="closeTermsBtn" data-i18n="closeBtn" class="primary small">关闭</button>
                </div>
            </div>
        </div>
    </div>

            let currentLang = localStorage.getItem('mind_insurance_lang') || 'zh';

            function updateUILanguage() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (i18n[currentLang] && i18n[currentLang][key]) {
                        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                            el.placeholder = i18n[currentLang][key];
                        } else {
                            el.innerText = i18n[currentLang][key];
                        }
                    }
                });
                document.getElementById('privacyContent').innerHTML = i18n[currentLang].privacyText;
                document.getElementById('termsContent').innerHTML = i18n[currentLang].termsText;
                document.getElementById('editTaskName').placeholder = i18n[currentLang].taskNamePlaceholder;
                document.getElementById('editFinalEmail').placeholder = i18n[currentLang].finalEmailPlaceholder;
                document.getElementById('editWarningMessage').placeholder = i18n[currentLang].warningContentPlaceholder;
                document.getElementById('editFinalMsg').placeholder = i18n[currentLang].finalMsgLabel.split('（')[0] + ' (e.g., User has not checked in for days, task terminated...)';
            }

            function bindModalOutsideClose(modalId, cardId) {
                const modal = document.getElementById(modalId);
                const card = document.getElementById(cardId);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal && !card.contains(e.target)) {
                        modal.classList.add('hidden');
                    }
                });
            }

            function initBaseFunctions() {
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const lang = e.target.getAttribute('data-lang');
                        if (lang) {
                            currentLang = lang;
                            localStorage.setItem('mind_insurance_lang', lang);
                            updateUILanguage();
                            if (!document.getElementById('taskListPage').classList.contains('hidden')) {
                                renderTaskList();
                            } else if (!document.getElementById('taskEditPage').classList.contains('hidden')) {
                                loadTaskData(currentTaskId);
                            }
                        }
                    });
                });

                bindModalOutsideClose('editFinalModal', 'editFinalModal .modal-card');
                bindModalOutsideClose('phoneModal', 'phoneModal .modal-card');
                bindModalOutsideClose('waitAuthModal', 'waitAuthModal .modal-card');
                bindModalOutsideClose('privacyModal', 'privacyModal .modal-card');
                bindModalOutsideClose('termsModal', 'termsModal .modal-card');

                document.getElementById('showPrivacyLink').addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById('privacyModal').classList.remove('hidden');
                });
                document.getElementById('showTermsLink').addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById('termsModal').classList.remove('hidden');
                });
                document.getElementById('closePrivacyBtn').addEventListener('click', () => {
                    document.getElementById('privacyModal').classList.add('hidden');
                });
                document.getElementById('closeTermsBtn').addEventListener('click', () => {
                    document.getElementById('termsModal').classList.add('hidden');
                });

                document.getElementById('closeWaitAuthBtn').addEventListener('click', () => {
                    document.getElementById('waitAuthModal').classList.add('hidden');
                });

                document.getElementById('editFinalCancelBtn').addEventListener('click', () => {
                    document.getElementById('editFinalModal').classList.add('hidden');
                });

                document.getElementById('phoneCancelBtn').addEventListener('click', () => {
                    document.getElementById('phoneModal').classList.add('hidden');
                });

                document.getElementById('backToTaskListBtn').addEventListener('click', () => {
                    document.getElementById('taskEditPage').classList.add('hidden');
                    document.getElementById('taskListPage').classList.remove('hidden');
                    renderTaskList();
                });

                document.getElementById('addNewTaskBtn').addEventListener('click', () => {
                    currentTaskId = null;
                    document.getElementById('editTaskName').value = '';
                    document.getElementById('editCycleDays').value = '1';
                    document.getElementById('editWarningDays').value = '2';
                    document.getElementById('editFinalDays').value = '3';
                    document.getElementById('editWarningEmail').value = currentUser.email;
                    document.getElementById('editFinalEmail').value = '';
                    document.getElementById('editWarningMessage').value = '';
                    document.getElementById('needHumanConfirmCheckbox').checked = false;
                    document.getElementById('editLastCheckin').innerText = i18n[currentLang].lastCheckinLabel + i18n[currentLang].never;
                    document.getElementById('editTaskStatus').className = 'status-badge normal';
                    document.getElementById('editTaskStatus').innerText = i18n[currentLang].statusNormal;
                    finalMessageCache = '';
                    document.getElementById('taskListPage').classList.add('hidden');
                    document.getElementById('taskEditPage').classList.remove('hidden');
                });

                // 一键打卡按钮事件
                document.getElementById('autoCheckinAllBtn').addEventListener('click', async () => {
                    if (!currentUser.email) {
                        alert(i18n[currentLang].apiError);
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/auto-checkin?token=${TOKEN}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: currentUser.email })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            const msg = i18n[currentLang].autoCheckinSuccess.replace('{count}', data.count || 0);
                            alert(msg);
                            renderTaskList();
                        } else {
                            alert(data.error || i18n[currentLang].checkinFailed);
                        }
                    } catch (err) {
                        alert(i18n[currentLang].apiError);
                    }
                });

                document.getElementById('editFinalBtn').addEventListener('click', () => {
                    document.getElementById('editFinalMsg').value = finalMessageCache;
                    document.getElementById('editFinalModal').classList.remove('hidden');
                });

                document.getElementById('editFinalSaveBtn').addEventListener('click', () => {
                    finalMessageCache = document.getElementById('editFinalMsg').value.trim();
                    alert(i18n[currentLang].finalMsgSaveSuccess);
                    document.getElementById('editFinalModal').classList.add('hidden');
                });

                // 电话保存按钮
                document.getElementById('phoneSaveBtn').addEventListener('click', async () => {
                    const phone = document.getElementById('phoneNumber').value.trim();
                    const countryCode = document.getElementById('countryCode').value;
                    if (!phone) {
                        alert(i18n[currentLang].phoneRequired);
                        return;
                    }

                    try {
                        // 保存电话到临时存储，等待任务保存时提交
                        const fullPhone = countryCode + ' ' + phone;
                        localStorage.setItem('tempContactPhone', fullPhone);
                        alert(i18n[currentLang].phoneSaveSuccess);
                        document.getElementById('phoneModal').classList.add('hidden');
                    } catch (err) {
                        alert(i18n[currentLang].apiError);
                    }
                });

                document.getElementById('editManualCheckinBtn').addEventListener('click', async () => {
                    if (!currentTaskId) {
                        alert(i18n[currentLang].apiError);
                        return;
                    }
                    try {
                        const res = await fetch(`${API_BASE}/tasks/${currentTaskId}/checkin?token=${TOKEN}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: currentUser.email })
                        });
                        if (res.ok) {
                            alert(i18n[currentLang].checkinSuccess);
                            loadTaskData(currentTaskId);
                        } else {
                            alert(i18n[currentLang].checkinFailed);
                        }
                    } catch (err) {
                        alert(i18n[currentLang].apiError);
                    }
                });

                // 保存任务按钮
                document.getElementById('editSaveTaskBtn').addEventListener('click', async () => {
                    if (!confirm(i18n[currentLang].confirmSave)) return;

                    const needHumanConfirm = document.getElementById('needHumanConfirmCheckbox').checked;
                    const taskData = {
                        name: document.getElementById('editTaskName').value.trim(),
                        cycle_days: parseInt(document.getElementById('editCycleDays').value),
                        warning_days: parseInt(document.getElementById('editWarningDays').value),
                        final_days: parseInt(document.getElementById('editFinalDays').value),
                        warning_email: currentUser.email,
                        final_email: document.getElementById('editFinalEmail').value.trim(),
                        warning_message: document.getElementById('editWarningMessage').value.trim(),
                        final_message: finalMessageCache,
                        need_human_confirm: needHumanConfirm,
                        email: currentUser.email
                    };

                    if (!taskData.name) {
                        alert(i18n[currentLang].taskNamePlaceholder + '不能为空');
                        return;
                    }

                    if (needHumanConfirm) {
                        const tempPhone = localStorage.getItem('tempContactPhone');
                        if (tempPhone) {
                            taskData.contact_phone = tempPhone;
                        }
                    }

                    try {
                        let res;
                        const url = currentTaskId 
                            ? `${API_BASE}/tasks/${currentTaskId}?token=${TOKEN}`
                            : `${API_BASE}/tasks?token=${TOKEN}`;
                        const method = currentTaskId ? 'PUT' : 'POST';
                        res = await fetch(url, {
                            method,
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(taskData)
                        });

                        if (res.ok) {
                            alert(i18n[currentLang].taskSaveSuccess);
                            localStorage.removeItem('tempContactPhone');
                            document.getElementById('taskEditPage').classList.add('hidden');
                            document.getElementById('taskListPage').classList.remove('hidden');
                            renderTaskList();
                        } else {
                            const errorData = await res.json();
                            alert(i18n[currentLang].taskSaveFailed + ': ' + (errorData.error || ''));
                        }
                    } catch (err) {
                        alert(i18n[currentLang].apiError);
                    }
                });

                document.getElementById('editDeleteTaskBtn').addEventListener('click', async () => {
                    if (!currentTaskId || !confirm(i18n[currentLang].confirmDelete)) return;
                    try {
                        const res = await fetch(`${API_BASE}/tasks/${currentTaskId}?token=${TOKEN}&email=${encodeURIComponent(currentUser.email)}`, {
                            method: 'DELETE'
                        });
                        if (res.ok) {
                            alert(i18n[currentLang].taskDeleteSuccess);
                            document.getElementById('taskEditPage').classList.add('hidden');
                            document.getElementById('taskListPage').classList.remove('hidden');
                            renderTaskList();
                        } else {
                            alert(i18n[currentLang].taskDeleteFailed);
                        }
                    } catch (err) {
                        alert(i18n[currentLang].apiError);
                    }
                });

                // 复选框立即弹出电话框
                document.getElementById('needHumanConfirmCheckbox').addEventListener('change', function(e) {
                    if (e.target.checked) {
                        let currentPhone = '';
                        if (currentTaskId) {
                            const task = tasks.find(t => t.id === currentTaskId);
                            if (task && task.contact_phone) {
                                currentPhone = task.contact_phone;
                            }
                        }
                        if (currentPhone) {
                            const parts = currentPhone.split(' ');
                            if (parts.length === 2) {
                                document.getElementById('countryCode').value = parts[0];
                                document.getElementById('phoneNumber').value = parts[1];
                            } else {
                                document.getElementById('countryCode').value = '+86';
                                document.getElementById('phoneNumber').value = currentPhone;
                            }
                        } else {
                            document.getElementById('countryCode').value = '+86';
                            document.getElementById('phoneNumber').value = '';
                        }
                        document.getElementById('phoneModal').classList.remove('hidden');
                    } else {
                        localStorage.removeItem('tempContactPhone');
                    }
                });
            }

            // 登录相关
            document.getElementById('sendLoginCodeBtn').addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value.trim();
                if (!email) {
                    alert(i18n[currentLang].loginEmailRequired);
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE}/send-login-code`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        alert(i18n[currentLang].codeSent);
                    } else {
                        if (res.status === 403 && data.error === 'NEED_AUTHORIZATION') {
                            document.getElementById('waitAuthMessage').innerText = data.message || i18n[currentLang].apiError;
                            document.getElementById('waitAuthModal').classList.remove('hidden');
                        } else {
                            alert(data.error || i18n[currentLang].codeSendFailed);
                        }
                    }
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            document.getElementById('verifyAndEnterBtn').addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value.trim();
                const code = document.getElementById('loginCode').value.trim();

                if (!email) {
                    alert(i18n[currentLang].loginEmailRequired);
                    return;
                }
                if (!code) {
                    alert(i18n[currentLang].codeRequired);
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE}/verify-login-code`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, code })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        alert(i18n[currentLang].verifySuccess);
                        currentUser.email = email;
                        localStorage.setItem('mind_insurance_user', JSON.stringify(currentUser));
                        document.getElementById('splashPage').classList.add('hidden');
                        document.getElementById('taskListPage').classList.remove('hidden');
                        renderTaskList();
                    } else {
                        alert(data.error || i18n[currentLang].verifyFailed);
                    }
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            });

            // 任务列表渲染
            async function renderTaskList() {
                try {
                    const res = await fetch(`${API_BASE}/tasks?token=${TOKEN}&email=${encodeURIComponent(currentUser.email)}`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    tasks = await res.json();
                    const container = document.getElementById('taskListContainer');
                    container.innerHTML = '';

                    if (!tasks || tasks.length === 0) {
                        container.innerHTML = `<div style="text-align:center; padding:20px; color:#666;">${i18n[currentLang].noTasks}</div>`;
                        return;
                    }

                    tasks.forEach(task => {
                        let lastCheckinDisplay = i18n[currentLang].never;
                        if (task.last_checkin != null && task.last_checkin !== '') {
                            const ts = Number(task.last_checkin);
                            if (!isNaN(ts) && ts > 0) {
                                const date = ts < 10000000000 ? new Date(ts * 1000) : new Date(ts);
                                if (!isNaN(date.getTime())) {
                                    lastCheckinDisplay = date.toLocaleString();
                                }
                            }
                        }

                        const card = document.createElement('div');
                        card.className = 'card task-list-card';
                        card.innerHTML = `
                            <div class="task-list-name">${task.name || i18n[currentLang].taskNamePlaceholder}</div>
                            <div class="task-list-info">
                                <span class="status-badge ${task.status || 'normal'}">${
                                    task.status === 'warning' ? i18n[currentLang].statusWarning : 
                                    task.status === 'final' ? i18n[currentLang].statusFinal : 
                                    i18n[currentLang].statusNormal
                                }</span>
                                <span class="human-badge ${task.need_human_confirm ? 'need' : 'not-need'}">
                                    ${task.need_human_confirm ? '需人工确认' : '无需确认'}
                                </span>
                            </div>
                            <div class="recent-checkin">
                                ${i18n[currentLang].lastCheckinLabel} ${lastCheckinDisplay}
                            </div>
                        `;

                        card.addEventListener('click', () => {
                            currentTaskId = task.id;
                            loadTaskData(task.id);
                            document.getElementById('taskListPage').classList.add('hidden');
                            document.getElementById('taskEditPage').classList.remove('hidden');
                        });

                        container.appendChild(card);
                    });
                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            }

            // 加载单个任务数据
            async function loadTaskData(taskId) {
                try {
                    const res = await fetch(`${API_BASE}/tasks/${taskId}?token=${TOKEN}&email=${encodeURIComponent(currentUser.email)}`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const task = await res.json();

                    document.getElementById('editTaskName').value = task.name || '';
                    document.getElementById('editCycleDays').value = task.cycle_days || 1;
                    document.getElementById('editWarningDays').value = task.warning_days || 2;
                    document.getElementById('editFinalDays').value = task.final_days || 3;
                    document.getElementById('editWarningEmail').value = task.warning_email || currentUser.email;
                    document.getElementById('editFinalEmail').value = task.final_email || '';
                    document.getElementById('editWarningMessage').value = task.warning_message || '';
                    document.getElementById('needHumanConfirmCheckbox').checked = task.need_human_confirm || false;

                    let lastCheckinDisplay = i18n[currentLang].never;
                    if (task.last_checkin != null && task.last_checkin !== '') {
                        const ts = Number(task.last_checkin);
                        if (!isNaN(ts) && ts > 0) {
                            const date = ts < 10000000000 ? new Date(ts * 1000) : new Date(ts);
                            if (!isNaN(date.getTime())) {
                                lastCheckinDisplay = date.toLocaleString();
                            }
                        }
                    }
                    document.getElementById('editLastCheckin').innerText = `${i18n[currentLang].lastCheckinLabel} ${lastCheckinDisplay}`;

                    const statusEl = document.getElementById('editTaskStatus');
                    statusEl.className = `status-badge ${task.status || 'normal'}`;
                    statusEl.innerText = 
                        task.status === 'warning' ? i18n[currentLang].statusWarning : 
                        task.status === 'final' ? i18n[currentLang].statusFinal : 
                        i18n[currentLang].statusNormal;

                    finalMessageCache = task.final_message || '';

                } catch (err) {
                    alert(i18n[currentLang].apiError);
                }
            }

            function initApp() {
                initBaseFunctions();
                updateUILanguage();
                const savedUser = localStorage.getItem('mind_insurance_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('splashPage').classList.add('hidden');
                    document.getElementById('taskListPage').classList.remove('hidden');
                    renderTaskList();
                }
            }

            window.addEventListener('DOMContentLoaded', initApp);
        })();
    </script>
</body>
</html>
